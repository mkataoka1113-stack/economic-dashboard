# ============================================
# 経済動向ダッシュボード 設定ファイル
# ============================================
# 銘柄の追加・削除はこのファイルを編集するだけでOK
# code: Yahoo Financeのティッカー（日本株は末尾に.T）

watchlist:
  - {code: "4816.T", name: "東映アニメーション", theme: "アニメ・IP"}
  - {code: "6506.T", name: "安川電機", theme: "フィジカルAI・ロボット"}
  - {code: "6954.T", name: "ファナック", theme: "産業ロボット"}
  - {code: "6301.T", name: "コマツ", theme: "建設機械の自動化"}
  - {code: "8306.T", name: "三菱UFJ", theme: "銀行・金利"}
  - {code: "6758.T", name: "ソニーグループ", theme: "エンタメ・アニメ配信"}

# 固定で追跡するテーマ（毎回必ず分析に含まれる）
fixed_themes:
  - "フィジカルAI × 建設"
  - "アニメ・コンテンツ"
  - "AI全般"

# 「今日の学び」の難易度レベル
# beginner → intermediate → advanced に手動で変更可
learning_level: "beginner"

# 主要指数（変更不要）
indices:
  - {code: "^N225", name: "日経平均"}
  - {code: "1306.T", name: "TOPIX"}
  - {code: "JPY=X", name: "ドル円"}
  - {code: "^GSPC", name: "S&P 500"}
  - {code: "^IXIC", name: "NASDAQ"}

# RSSフィード（無料・制限なし）
rss_feeds:
  - {url: "https://assets.wor.jp/rss/rdf/nikkei/economy.rdf", name: "日経", category: "japan"}
  - {url: "https://news.google.com/rss/search?q=日経平均+株価+市場+決算&hl=ja&gl=JP&ceid=JP:ja", name: "Google", category: "japan"}
  - {url: "https://news.google.com/rss/search?q=stock+market+economy+Fed&hl=en&gl=US&ceid=US:en", name: "Global", category: "global"}
  - {url: "https://feeds.finance.yahoo.co.jp/rss/2ch/news", name: "Yahoo", category: "japan"}

